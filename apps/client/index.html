<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="2-player cooperative puzzle platformer – online co-op with pixel-art style" />
    <title>Co-op Puzzle · 双人合作解谜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main id="app">
      <section class="panel" id="home-panel">
        <div>
          <p class="eyebrow">⬤ 2 PLAYER CO-OP</p>
          <h1>PUZZLE<br /><span class="accent">RUNNERS</span></h1>
          <p class="copy">Create a room or enter a 4-char code to join.</p>
        </div>

        <div class="actions">
          <button id="create-room-button" type="button">CREATE</button>
          <button id="ready-button" type="button" disabled>READY</button>
          <button id="restart-button" type="button" disabled>RESTART</button>
          <label class="level-picker">
            <span>LEVEL</span>
            <select id="level-select" disabled>
              <option value="0">01 Jump Relay</option>
              <option value="1">02 Gate Chain</option>
              <option value="2">03 Switchback</option>
              <option value="3">04 Laser Relay</option>
              <option value="4">05 Ferry Pit</option>
              <option value="5">06 Split Lock</option>
              <option value="6">07 Spike Sprint</option>
              <option value="7">08 Laser Clock</option>
              <option value="8">09 Crusher Climb</option>
              <option value="9">10 Final Gauntlet</option>
            </select>
          </label>
          <form id="join-room-form">
            <input
              id="room-code-input"
              autocomplete="off"
              maxlength="4"
              placeholder="CODE"
              spellcheck="false"
            />
            <button type="submit">JOIN</button>
          </form>
        </div>
      </section>

      <div class="audio-controls" id="audio-controls">
        <button id="volume-toggle" type="button" aria-label="Audio settings" aria-pressed="false">🔊</button>
        <div id="volume-panel" class="volume-panel">
          <label>
            <span>MUSIC</span>
            <input id="volume-music" type="range" min="0" max="100" step="1" value="60" />
          </label>
          <label>
            <span>SFX</span>
            <input id="volume-sfx" type="range" min="0" max="100" step="1" value="80" />
          </label>
          <button id="volume-mute" type="button">MUTE</button>
        </div>
      </div>

      <section class="hud" id="room-hud">
        <div>
          <span>ROOM</span>
          <strong id="room-code-label">----</strong>
        </div>
        <div>
          <span>ROLE</span>
          <strong id="role-label">-</strong>
        </div>
        <div>
          <span>STATUS</span>
          <strong id="status-label">Not connected</strong>
        </div>
        <div>
          <span>LEVEL</span>
          <strong id="level-label">-</strong>
        </div>
        <div>
          <span>PING</span>
          <strong id="ping-label">-</strong>
        </div>
      </section>

      <div id="game"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
